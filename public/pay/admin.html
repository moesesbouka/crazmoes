<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>BDD Pay · Usage Dashboard</title>
  <style>
    :root{--bg:#0b1019;--panel:#121929;--panel2:#182032;--line:rgba(255,255,255,.08);--text:#eef3fb;--muted:rgba(238,243,251,.55);--gold:#d8a453;--green:#22c879;--blue:#5a8cff;--red:#ff5b5b;--radius:16px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;padding:24px 16px}
    h1{font-size:1.4rem;font-weight:700;margin-bottom:4px}
    .sub{color:var(--muted);font-size:.85rem;margin-bottom:28px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:32px}
    .stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px}
    .stat-label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
    .stat-value{font-size:2rem;font-weight:800;line-height:1}
    .stat-sub{font-size:.75rem;color:var(--muted);margin-top:4px}
    .gold{color:var(--gold)}.green{color:var(--green)}.blue{color:var(--blue)}.red{color:var(--red)}
    table{width:100%;border-collapse:collapse;font-size:.85rem}
    th{text-align:left;padding:10px 12px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--line);font-size:.75rem;text-transform:uppercase;letter-spacing:.05em}
    td{padding:10px 12px;border-bottom:1px solid var(--line)}
    tr:last-child td{border-bottom:none}
    .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.72rem;font-weight:600}
    .badge-install{background:rgba(34,200,121,.15);color:var(--green)}
    .badge-session{background:rgba(90,140,255,.15);color:var(--blue)}
    .badge-tab{background:rgba(216,164,83,.12);color:var(--gold)}
    .badge-expense{background:rgba(255,91,91,.15);color:var(--red)}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:20px}
    .panel-title{font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:16px}
    .loading{color:var(--muted);text-align:center;padding:40px;font-size:.9rem}
    .refresh{background:var(--panel2);border:1px solid var(--line);color:var(--text);padding:8px 18px;border-radius:8px;cursor:pointer;font-size:.85rem;margin-left:12px}
    .refresh:hover{background:#1f2a40}
    .header-row{display:flex;align-items:center;margin-bottom:6px}
    .empty{color:var(--muted);font-size:.85rem;padding:20px 0;text-align:center}
    .pwa-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:.7rem;background:rgba(34,200,121,.15);color:var(--green);margin-left:6px}
  </style>
</head>
<body>
  <div class="header-row">
    <div>
      <h1>BDD Pay · Usage Dashboard</h1>
      <div class="sub" id="lastUpdated">Loading…</div>
    </div>
    <button class="refresh" onclick="loadData()">↻ Refresh</button>
  </div>

  <div class="grid" id="statsGrid">
    <div class="loading">Loading stats…</div>
  </div>

  <div class="panel">
    <div class="panel-title">Recent Activity</div>
    <div id="recentTable"><div class="loading">Loading…</div></div>
  </div>

  <div class="panel">
    <div class="panel-title">Daily Sessions (last 14 days)</div>
    <div id="dailyChart" style="padding:10px 0"></div>
  </div>

<script>
const SUPABASE_URL  = 'https://sfheqjnxlkygjfohoybo.supabase.co';
const SERVICE_KEY   = 'SERVICE_ROLE_PLACEHOLDER'; // replaced server-side — see note
const ANON_KEY      = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNmaGVxam54bGt5Z2pmb2hveWJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjgzNTc3NjUsImV4cCI6MjA4MzkzMzc2NX0.oWEnB48w_k_hOtYM1Ls2AHj8j-THDs_43BBzXrqPyxY';

async function query(path) {
  const r = await fetch(
    `${SUPABASE_URL}/rest/v1/bdd_pay_events?select=*&order=created_at.desc&limit=500`,
    { headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}` } }
  );
  if (!r.ok) throw new Error(await r.text());
  const events = await r.json();
  return { events };
}

function fmtTime(ts) {
  return new Date(ts).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',hour12:true});
}

function badgeClass(ev) {
  if (ev==='install') return 'badge-install';
  if (ev==='session_start') return 'badge-session';
  if (ev==='tab_view') return 'badge-tab';
  if (ev==='expense_submit') return 'badge-expense';
  return 'badge-session';
}

async function loadData() {
  document.getElementById('lastUpdated').textContent = 'Refreshing…';
  try {
    const data = await query('action=all');
    const events = data.events || [];

    // Stats
    const installs     = events.filter(e=>e.event==='install').length;
    const sessions     = events.filter(e=>e.event==='session_start').length;
    const pwaLaunches  = events.filter(e=>e.event==='session_start' && e.standalone).length;
    const expenses     = events.filter(e=>e.event==='expense_submit').length;
    const lastSeen     = events.length ? fmtTime(events[0].created_at) : 'Never';
    const lastSession  = events.find(e=>e.event==='session_start');
    const lastPWA      = events.find(e=>e.event==='session_start' && e.standalone);

    document.getElementById('statsGrid').innerHTML = `
      <div class="stat"><div class="stat-label">Installs</div><div class="stat-value green">${installs}</div><div class="stat-sub">PWA accepted</div></div>
      <div class="stat"><div class="stat-label">Total Sessions</div><div class="stat-value blue">${sessions}</div><div class="stat-sub">${pwaLaunches} from installed PWA</div></div>
      <div class="stat"><div class="stat-label">Expenses Filed</div><div class="stat-value red">${expenses}</div><div class="stat-sub">total submissions</div></div>
      <div class="stat"><div class="stat-label">Last Active</div><div class="stat-value gold" style="font-size:1rem;padding-top:4px">${lastSession ? fmtTime(lastSession.created_at) : '—'}</div><div class="stat-sub">${lastPWA ? 'Last PWA: '+fmtTime(lastPWA.created_at) : 'No PWA launch yet'}</div></div>
    `;

    // Recent table
    const recent = events.slice(0, 40);
    if (!recent.length) {
      document.getElementById('recentTable').innerHTML = '<div class="empty">No activity yet — share the link first.</div>';
    } else {
      document.getElementById('recentTable').innerHTML = `
        <table>
          <thead><tr><th>Time</th><th>Event</th><th>Detail</th><th>Mode</th></tr></thead>
          <tbody>${recent.map(e=>`
            <tr>
              <td style="color:var(--muted);white-space:nowrap">${fmtTime(e.created_at)}</td>
              <td><span class="badge ${badgeClass(e.event)}">${e.event}</span></td>
              <td style="color:var(--muted)">${e.detail||'—'}</td>
              <td>${e.standalone ? '<span class="pwa-badge">PWA</span>' : '<span style="color:var(--muted);font-size:.75rem">browser</span>'}</td>
            </tr>`).join('')}
          </tbody>
        </table>`;
    }

    // Daily chart (last 14 days)
    const days = {};
    const now = new Date();
    for (let i=13;i>=0;i--) {
      const d = new Date(now); d.setDate(d.getDate()-i);
      days[d.toISOString().slice(0,10)] = 0;
    }
    events.filter(e=>e.event==='session_start').forEach(e=>{
      const d = e.created_at.slice(0,10);
      if (d in days) days[d]++;
    });
    const max = Math.max(...Object.values(days), 1);
    document.getElementById('dailyChart').innerHTML = `
      <div style="display:flex;align-items:flex-end;gap:6px;height:80px;padding-bottom:20px;position:relative">
        ${Object.entries(days).map(([d,v])=>`
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
            <div title="${d}: ${v} session${v!==1?'s':''}" style="width:100%;background:${v>0?'var(--blue)':'var(--line)'};border-radius:4px 4px 0 0;height:${Math.max(4,(v/max)*60)}px;opacity:${v>0?1:.4};transition:height .3s"></div>
            <div style="font-size:.6rem;color:var(--muted);transform:rotate(-30deg);white-space:nowrap">${d.slice(5)}</div>
          </div>`).join('')}
      </div>`;

    document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById('statsGrid').innerHTML = `<div class="loading" style="color:var(--red)">Error: ${e.message}</div>`;
  }
}

loadData();
setInterval(loadData, 60000); // auto-refresh every minute
</script>
</body>
</html>
